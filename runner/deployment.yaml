apiVersion: apps/v1
kind: Deployment
metadata:
  generation: 9
  name: actions-runner
  namespace: runner
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: actions-runner
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
      labels:
        app: actions-runner
    spec:
      containers:
      - env:
        - name: DOCKER_TLS_CERTDIR
        image: docker:dind
        imagePullPolicy: IfNotPresent
        name: dind
        securityContext:
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        - /bin/sh
          until wget -qO- http://localhost:2375/_ping 2>/dev/null | grep -q OK; do sleep 1; done
          echo "Registering runner with token ${RUNNER_TOKEN:0:20}..."
          forgejo-runner register --no-interactive \
            --instance https://git.example.com \
            --token "$RUNNER_TOKEN" \
            --name "k3s-runner-$(hostname)" \
            --labels docker \
            2>&1
          echo "Register exit code: $?"
          sleep 2
          echo "Starting daemon..."
          exec forgejo-runner daemon 2>&1
        env:
        - name: DOCKER_HOST
          value: tcp://localhost:2375
          valueFrom:
            secretKeyRef:
              key: token
              name: runner-secret
        image: data.forgejo.org/forgejo/runner:12
        imagePullPolicy: IfNotPresent
        name: runner
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: runner-data
          name: kubeconfig
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: runner-data
        persistentVolumeClaim:
          claimName: runner-data
          defaultMode: 420
          items:
          - key: config
            path: config
          name: kubeconfig
        name: kubeconfig
