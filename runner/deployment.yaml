apiVersion: apps/v1
kind: Deployment
metadata:
  name: actions-runner
  namespace: runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actions-runner
  template:
    metadata:
      labels:
        app: actions-runner
    spec:
      containers:
      - name: dind
        image: docker:dind
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        securityContext:
          privileged: true
        volumeMounts:
        - name: dind-sock
          mountPath: /var/run
      - name: runner
        image: data.forgejo.org/forgejo/runner:12
        env:
        - name: FORGEJO_DOMAIN
          value: FORGEJO_DOMAIN_PLACEHOLDER
        - name: DOCKER_HOST
          value: unix:///var/run/docker.sock
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              name: runner-secret
              key: token
        command:
        - /bin/sh
        - -c
        - |
          until [ -S /var/run/docker.sock ]; do sleep 1; done
          echo "Registering runner..."
          forgejo-runner register --no-interactive \
            --instance https://$FORGEJO_DOMAIN \
            --token "$RUNNER_TOKEN" \
            --name "k3s-runner-$(hostname)" \
            --labels docker \
            2>&1
          echo "Generating config..."
          forgejo-runner generate-config > config.yaml
          sed -i 's|options:|options: "-v /var/run/docker.sock:/var/run/docker.sock"|' config.yaml
          echo "Starting daemon..."
          exec forgejo-runner daemon --config config.yaml
        volumeMounts:
        - name: runner-data
          mountPath: /data
        - name: kubeconfig
          mountPath: /home/runner/.kube
        - name: dind-sock
          mountPath: /var/run
      volumes:
      - name: dind-sock
        emptyDir: {}
      - name: runner-data
        persistentVolumeClaim:
          claimName: runner-data
      - name: kubeconfig
        configMap:
          name: kubeconfig
          items:
          - key: config
            path: config
