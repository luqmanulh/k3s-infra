apiVersion: apps/v1
kind: Deployment
metadata:
  name: actions-runner
  namespace: runner
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: actions-runner
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: actions-runner
    spec:
      containers:
      - env:
        - name: DOCKER_TLS_CERTDIR
        image: docker:dind
        imagePullPolicy: IfNotPresent
        name: dind
        resources: {}
        securityContext:
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      - command:
        - /bin/sh
        - -c
        - "# Install Docker CLI\napt-get update -qq && apt-get install -y -qq docker.io-cli\
          \ 2>/dev/null || {\n  curl -fsSL https://get.docker.com | sh\n}\n# Install\
          \ kubectl\ncurl -LO \"https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl\"\
          \ && chmod +x kubectl && mv kubectl /usr/local/bin/\n# Wait for DinD\necho\
          \ \"Waiting for DinD...\" && until wget -qO- http://localhost:2375/_ping\
          \ 2>/dev/null | grep -q OK; do sleep 1; done && echo \"DinD ready\"\n# Config\n\
          cat > /data/config.yml << CFG\nlog:\n  level: info\nrunner:\n  file: /data/.runner\n\
          \  capacity: 2\ncache:\n  enabled: true\n  dir: /data/cache\ncontainer:\n\
          \  network: host\n  valid_volumes:\n    - /var/run/docker.sock:/var/run/docker.sock\n\
          \    - /home/runner/.kube:/root/.kube\nCFG\n# Register\nforgejo-runner register\
          \ --no-interactive \\\n  --instance https://git.example.com \\\n  --token\
          \ $RUNNER_TOKEN \\\n  --name \"k3s-runner\" \\\n  --labels docker \\\n \
          \ 2>&1\n# Start daemon\nexec forgejo-runner daemon --config /data/config.yml\n"
        env:
        - name: DOCKER_HOST
          value: tcp://localhost:2375
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: runner-secret
        image: data.forgejo.org/forgejo/runner:12
        imagePullPolicy: IfNotPresent
        name: runner
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: runner-data
        - mountPath: /home/runner/.kube
          name: kubeconfig
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: runner-data
        persistentVolumeClaim:
          claimName: runner-data
      - configMap:
          defaultMode: 420
          items:
          - key: config
            path: config
          name: kubeconfig
        name: kubeconfig
