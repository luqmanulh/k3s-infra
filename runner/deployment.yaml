apiVersion: apps/v1
kind: Deployment
metadata:
  name: actions-runner
  namespace: runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actions-runner
  template:
    metadata:
      labels:
        app: actions-runner
    spec:
      containers:
      - name: dind
        image: docker:dind
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        securityContext:
          privileged: true
      - name: runner
        image: data.forgejo.org/forgejo/runner:12
        env:
        - name: DOCKER_HOST
          value: tcp://172.17.0.1:2375
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              name: runner-secret
              key: token
        command:
        - /bin/sh
        - -c
        - |
          until wget -qO- http://172.17.0.1:2375/_ping 2>/dev/null | grep -q OK; do sleep 1; done
          echo "Registering runner..."
          forgejo-runner register --no-interactive \
            --instance https://git.example.com \
            --token "$RUNNER_TOKEN" \
            --name "k3s-runner-$(hostname)" \
            --labels docker \
            2>&1
          echo "Starting daemon..."
          exec forgejo-runner daemon
        volumeMounts:
        - name: runner-data
          mountPath: /data
        - name: kubeconfig
          mountPath: /home/runner/.kube
      volumes:
      - name: runner-data
        persistentVolumeClaim:
          claimName: runner-data
      - name: kubeconfig
        configMap:
          name: kubeconfig
          items:
          - key: config
            path: config
