  generation: 1
  name: actions-runner
  namespace: runner
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: actions-runner
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: actions-runner
    spec:
      containers:
      - env:
        - name: DOCKER_TLS_CERTDIR
        image: docker:dind
        imagePullPolicy: IfNotPresent
        name: dind
        resources: {}
        securityContext:
          privileged: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      - command:
        - /bin/sh
        - -c
        - |
          # Install Docker CLI
          apt-get update -qq && apt-get install -y -qq docker.io-cli 2>/dev/null || {
            curl -fsSL https://get.docker.com | sh
          }
          # Install kubectl
          curl -LO "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl" && chmod +x kubectl && mv kubectl /usr/local/bin/
          # Wait for DinD
          echo "Waiting for DinD..." && until wget -qO- http://localhost:2375/_ping 2>/dev/null | grep -q OK; do sleep 1; done && echo "DinD ready"
          # Config
          cat > /data/config.yml << CFG
          log:
            level: info
          runner:
            file: /data/.runner
            capacity: 2
          cache:
            enabled: true
            dir: /data/cache
          container:
            network: host
            valid_volumes:
              - /var/run/docker.sock:/var/run/docker.sock
              - /home/runner/.kube:/root/.kube
          CFG
          # Register
          forgejo-runner register --no-interactive \
            --instance https://git.example.com \
            --token $RUNNER_TOKEN \
            --name "k3s-runner" \
            --labels docker \
            2>&1
          # Start daemon
          exec forgejo-runner daemon --config /data/config.yml
        env:
        - name: DOCKER_HOST
          value: tcp://localhost:2375
        - name: RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: runner-secret
        image: data.forgejo.org/forgejo/runner:12
        imagePullPolicy: IfNotPresent
        name: runner
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: runner-data
        - mountPath: /home/runner/.kube
          name: kubeconfig
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: runner-data
        persistentVolumeClaim:
          claimName: runner-data
      - configMap:
          defaultMode: 420
          items:
          - key: config
            path: config
          name: kubeconfig
        name: kubeconfig
