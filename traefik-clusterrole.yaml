apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik
rules:
- apiGroups: [""]
  resources: [pods, services, endpoints, secrets, configmaps, nodes]
  verbs: [get, list, watch]
- apiGroups: ["networking.k8s.io"]
  resources: [ingresses, ingressclasses]
  verbs: [get, list, watch]
- apiGroups: ["traefik.io"]
  resources: [ingressroutes, ingressroutetcps, middlewares, middlewaretcps,
              tlsoptions, tlsstores, serverstransports, serverstransporttcps,
              traefikservices, ingressrouteudps]
  verbs: [get, list, watch]
- apiGroups: ["discovery.k8s.io"]
  resources: [endpointslices]
  verbs: [get, list, watch]
