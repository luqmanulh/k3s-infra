apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:13.1.0
        envFrom:
        - secretRef:
            name: grafana-secrets
        env:
        - name: GRAFANA_DOMAIN
          value: GRAFANA_DOMAIN_PLACEHOLDER
        - name: GF_SERVER_ROOT_URL
          value: https://$(GRAFANA_DOMAIN)
        ports:
        - containerPort: 3000
          name: http
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: /var/lib/grafana
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: grafana-data
