apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      containers:
      - env:
        - name: USER_UID
          value: '1000'
        - name: USER_GID
          value: '1000'
        envFrom:
        - secretRef:
            name: forgejo-secrets
        image: data.forgejo.org/forgejo/forgejo:15
        imagePullPolicy: IfNotPresent
        name: forgejo
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        - containerPort: 22
          name: ssh
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
        - mountPath: /data
          name: data
        - mountPath: /etc/localtime
          name: localtime
          readOnly: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: forgejo-data
      - hostPath:
          path: /etc/localtime
          type: File
        name: localtime
